name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # سنقوم بالدخول إلى المجلد الذي يحتوي على ملفات المشروع
      # وبناء التطبيق باستخدام نسخة Gradle المثبتة على السيرفر
      - name: Build with Gradle (Fallback Mode)
        run: |
          # ابحث عن المجلد الذي يحتوي على ملف build.gradle
          PROJECT_ROOT=$(find . -name "build.gradle*" -printf '%h\n' | head -n 1)
          cd $PROJECT_ROOT
          # استخدم 'gradle' بدلاً من './gradlew' لأن الملف مفقود
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app
          path: "**/build/outputs/apk/debug/*.apk"
