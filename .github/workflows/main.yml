name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # إذا كانت ملفاتك داخل مجلد، سنخبر النظام بالدخول إليه
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: |
          # ابحث عن ملف gradlew في أي مكان وقم بإعطائه الصلاحية
          find . -name "gradlew" -exec chmod +x {} +

      - name: Build with Gradle
        run: |
          # ابحث عن ملف gradlew وشغله لبناء التطبيق
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          $GRADLEW_PATH assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
